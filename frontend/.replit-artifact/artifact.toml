kind = "web"
previewPath = "/"
title = "CareerPrep AI"
version = "1.0.0"
id = "artifacts/career-prep-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21485

[services.development]
run = "pnpm --filter @workspace/career-prep-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-prep-ai", "run", "build" ]
publicDir = "artifacts/career-prep-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21485"
BASE_PATH = "/"
